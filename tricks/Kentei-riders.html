<p>The Kentei system is a progression framework built by Kyoki and the <a href="/brands/jmk-ride">JMK</a> team that classifies freestyle <a href="/tricks">tricks</a> into four distinct classes. By submitting a video showing you can land the required tricks for a specific tier, you can get officially featured on the <a href="https://www.jmkride.com/kentei-freeskaters">JMK website</a>.</p>
